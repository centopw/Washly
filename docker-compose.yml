services:
  bot:
    build: .
    ports:
      - "7860:7860"
    env_file:
      - .env
    environment:
      MONGODB_URI: mongodb://mongodb:27017
      BACKEND: mongo
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  mongo_data:
